services:
  web:
    image: nginx:alpine
    container_name: abenteuer-mittelerde
    ports:
      - "11223:80"
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./.htpasswd:/etc/nginx/.htpasswd:ro
      - /home/sydrv/Abenteuer in Mittelerde/Abenteuer_in_Mittelerde_komplett.mp4:/usr/share/nginx/video/Abenteuer_in_Mittelerde_komplett.mp4:ro
    restart: unless-stopped
    environment:
      - TZ=Europe/Berlin
    healthcheck:
      disable: true
