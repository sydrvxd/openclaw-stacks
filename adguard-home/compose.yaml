services:
  adguard:
    image: adguard/adguardhome:latest
    container_name: adguard-home
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "3100:3000/tcp"
      - "8053:80/tcp"
      - "853:853/tcp"
    volumes:
      - adguard-work:/opt/adguardhome/work
      - adguard-conf:/opt/adguardhome/conf
    environment:
      - TZ=Europe/Berlin

volumes:
  adguard-work:
  adguard-conf:
