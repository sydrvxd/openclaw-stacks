global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'nvidia-gpu'
    static_configs:
      - targets: ['gpu-exporter:9835']

  - job_name: 'qnap'
    scrape_interval: 30s
    scrape_timeout: 25s
    static_configs:
      - targets: ['qnap-exporter:9117']
    metrics_path: /metrics
